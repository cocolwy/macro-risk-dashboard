name: Update Macro Risk Data

on:
  schedule:
    # Run daily at 00:30 UTC (after US market close + settlement)
    - cron: '30 0 * * 1-6'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-data.yml'

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pandas numpy yfinance akshare scikit-learn requests feedparser

      - name: Fetch macro data
        run: python dashboard/fetch_macro_data.py

      - name: Run prediction model
        run: python dashboard/predict_model.py

      - name: Fetch news headlines
        run: python dashboard/news_fetcher.py

      - name: Run agent pipeline
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is set — agent will use OpenAI"
          else
            echo "OPENAI_API_KEY is empty — agent will use local synthesizer"
          fi
          python dashboard/agent_pipeline.py

      - name: Sync frontend public data
        run: |
          rm -rf dashboard/frontend/public/data
          cp -r dashboard/data dashboard/frontend/public/data

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/ dashboard/frontend/public/data/
          git diff --staged --quiet || git commit -m "chore: update macro risk data $(date -u +%Y-%m-%d)"
          git push

      - name: Check for alerts and notify
        id: check_alerts
        run: |
          python - <<'PY'
          import json
          import os

          with open("dashboard/data/summary.json") as f:
              summary = json.load(f)
          alerts = summary.get("alerts", {})
          danger = [k for k, v in alerts.items() if v["level"] == "danger"]
          warning = [k for k, v in alerts.items() if v["level"] == "warning"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              if danger:
                  msgs = "  |  ".join(f"🔴 {k}: {alerts[k]['message']}" for k in danger)
                  fh.write("has_danger=true\n")
                  fh.write(f"danger_msg={msgs}\n")
              if warning:
                  msgs = "  |  ".join(f"🟡 {k}: {alerts[k]['message']}" for k in warning)
                  fh.write("has_warning=true\n")
                  fh.write(f"warning_msg={msgs}\n")
          PY

      # secrets cannot be referenced in `if:` — probe via env instead
      - name: Check email secrets
        id: email
        env:
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_USER: ${{ secrets.ALERT_EMAIL_USER }}
        run: |
          if [ -n "$ALERT_EMAIL_TO" ] && [ -n "$ALERT_EMAIL_USER" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Email alerts skipped (ALERT_EMAIL_TO / ALERT_EMAIL_USER not set)"
          fi

      - name: Send email notification (danger)
        if: steps.check_alerts.outputs.has_danger == 'true' && steps.email.outputs.enabled == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "🔴 MACRO RISK ALERT - Danger Level Triggered"
          body: |
            Macro Risk Dashboard has detected DANGER-level signals:

            ${{ steps.check_alerts.outputs.danger_msg }}

            View dashboard: https://${{ github.repository_owner }}.github.io/macro-risk-dashboard/
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: Macro Risk Bot <${{ secrets.ALERT_EMAIL_USER }}>

      - name: Send email notification (warning)
        if: steps.check_alerts.outputs.has_warning == 'true' && steps.check_alerts.outputs.has_danger != 'true' && steps.email.outputs.enabled == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "🟡 MACRO RISK WARNING - Elevated Readings"
          body: |
            Macro Risk Dashboard has detected WARNING-level signals:

            ${{ steps.check_alerts.outputs.warning_msg }}

            View dashboard: https://${{ github.repository_owner }}.github.io/macro-risk-dashboard/
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: Macro Risk Bot <${{ secrets.ALERT_EMAIL_USER }}>
