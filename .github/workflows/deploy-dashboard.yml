name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'dashboard/frontend/**'
      - 'dashboard/data/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install dependencies
        working-directory: dashboard/frontend
        run: npm ci || npm install

      - name: Copy data to public folder
        run: |
          rm -rf dashboard/frontend/public/data
          cp -r dashboard/data dashboard/frontend/public/data

      - name: Build
        working-directory: dashboard/frontend
        run: npm run build

      - name: Copy data to dist
        run: |
          rm -rf dashboard/frontend/dist/data
          cp -r dashboard/data dashboard/frontend/dist/data

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
